name: Actualizar resultados Mundial

on:
  schedule:
    # GitHub NO respeta crons de alta frecuencia (los de cada pocos minutos
    # o "en punto" los descarta). Usamos minutos DESFASADOS de la hora en
    # punto (:07, :23, :37, :53), que GitHub suele respetar mejor.
    # Aun así es "mejor esfuerzo": si necesitas los resultados YA, usa el
    # botón "Run workflow" en la pestaña Actions (jala todo de un click).
    - cron: "7,23,37,53 * * * *"
  workflow_dispatch: {}   # permite ejecutarlo a mano desde la pestaña Actions

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar actualización
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node update.js
